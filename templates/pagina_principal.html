<!DOCTYPE html>
<html lang="pt-br">

<head>

    <link rel="stylesheet" href="pagina-principal.css">
    <!-- ícones Google Icons -->
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Link importação do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Link do icon -->
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>

</head>

<body>

    <!-- header bootstrap -->
     <header class="container--header">
        <img src="/static/img/InStock_logo_transparente.png" class="img--InStock-logo" alt="InStock Logo" style="width: 300px;">
        <ul class="nav justify-content-end">
            <li class="nav-item">
                <span class="nav-link active" aria-current="page" href="#">Bem vindo(a), [nome do usuário]</span>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#"><span class="material-symbols-outlined">shopping_cart</span></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#"><span class="material-symbols-outlined">logout</span></a>
            </li>
        </ul>
     </header>

    <main>

        <!-- Add o icon "mais" no botão -->
        <section class="btn-cadastrarProdCatEst">
            <button type="button" id="toggleButton">
                <span class="material-symbols-outlined">
                    add_2
                </span>
            </button>

        <!--  Opcoes que estão dentro do botão  -->
            <div class="opcoes" id="opcoesBotao" style="display: none; position: absolute;">
                <a href="">Adicionar Produto</a>
                <a href="">Adicionar Categoria</a>
                <a href="">Adicionar Estante</a>
            </div>
        </section>

        <!-- Card lateral esquerdo, aqui vai as categorias, estantes e produtos cadastrados -->
        <section class="card-filtrosCategoria">
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">Categorias</h5>
                    <h6 class="card-subtitle mb-2 text-body-secondary">Estante:</h6>
                    <h6 class="card-subtitle mb-2 text-body-secondary">Categoria:</h6>
                    <h6 class="card-subtitle mb-2 text-body-secondary">Produto:</h6>
                </div>
            </div>
        </section>
     
     </main>

    <footer>
        <!-- Add coisa depois -->
    </footer>
    
</div>
   
<!-- JS -->
  <script>

    // pega o botão, espera um clique e a cada clique ele vai inverter a visibilidade da div(opcoes) efeito de toggle
    document.addEventListener('DOMContentLoaded', function() {
      const toggleButton = document.getElementById('toggleButton');
      const opcoesDiv = document.getElementById('opcoesBotao');

      if (toggleButton && opcoesDiv) {
        toggleButton.addEventListener('click', function(event) {
          event.stopPropagation();
          
          if (opcoesDiv.style.display === 'none') {
            opcoesDiv.style.display = 'block';
          } else {
            opcoesDiv.style.display = 'none';
          }
        });

        // escuta o clique e exibe ou esconde o menu de opções.
        document.addEventListener('click', function(event) {
          if (!opcoesDiv.contains(event.target)) {
            opcoesDiv.style.display = 'none';
          }
        });
      }
    });
  </script>
  
</body>

</html>
